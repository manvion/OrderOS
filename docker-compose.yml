services:
  postgres:
    image: postgres:16-alpine
    container_name: dinedirect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dinedirect
      POSTGRES_PASSWORD: dinedirect
      POSTGRES_DB: dinedirect
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # The API's depends_on waits on this, so it never starts against a
      # database that is still initialising.
      test: ['CMD-SHELL', 'pg_isready -U dinedirect -d dinedirect']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dinedirect-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: dinedirect-api
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://dinedirect:dinedirect@postgres:5432/dinedirect
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles: ['full']

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Next inlines NEXT_PUBLIC_* at BUILD time, not runtime — so these have
        # to be build args, not just environment variables.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_APP_DOMAIN: ${NEXT_PUBLIC_APP_DOMAIN:-dinedirect.manvion.ca}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    container_name: dinedirect-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
    env_file:
      - .env
    depends_on:
      - api
    profiles: ['full']

volumes:
  postgres_data:
  redis_data:
