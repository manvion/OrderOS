services:
  postgres:
    image: postgres:16-alpine
    container_name: dinedirect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dinedirect
      POSTGRES_PASSWORD: dinedirect
      POSTGRES_DB: dinedirect
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # The API's depends_on waits on this, so it never starts against a
      # database that is still initialising.
      test: ['CMD-SHELL', 'pg_isready -U dinedirect -d dinedirect']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dinedirect-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # Self-hosted OSRM: reliable, keyless driving directions for the courier map, replacing
  # the flaky public demo server. On first boot it downloads OSRM_PBF_URL and preprocesses
  # it (once, cached in the volume) — set OSRM_PBF_URL in .env to your region's Geofabrik
  # extract. The API keeps working while this preprocesses; routing just falls back to a
  # straight line until it's ready.
  osrm:
    build:
      context: ./infra/osrm
    container_name: dinedirect-osrm
    restart: unless-stopped
    environment:
      OSRM_PBF_URL: ${OSRM_PBF_URL:-}
    ports:
      - '5000:5000'
    volumes:
      - osrm_data:/data
    profiles: ['full']

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: dinedirect-api
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://dinedirect:dinedirect@postgres:5432/dinedirect
      REDIS_URL: redis://redis:6379
      # Route through our own OSRM (above) instead of the public demo server.
      OSRM_URL: http://osrm:5000
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles: ['full']

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Next inlines NEXT_PUBLIC_* at BUILD time, not runtime — so these have
        # to be build args, not just environment variables. NEXT_PUBLIC_MAPTILER_KEY
        # included here on purpose: without it at build, the delivery map silently
        # falls back to the free (paler) CARTO tiles no matter the runtime env.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_APP_DOMAIN: ${NEXT_PUBLIC_APP_DOMAIN:-dinedirect.manvion.ca}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_MAPTILER_KEY: ${NEXT_PUBLIC_MAPTILER_KEY:-}
        NEXT_PUBLIC_OSRM_URL: ${NEXT_PUBLIC_OSRM_URL:-}
    container_name: dinedirect-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
    env_file:
      - .env
    depends_on:
      - api
    profiles: ['full']

volumes:
  postgres_data:
  redis_data:
  osrm_data:
